name: Deploy Midas site to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Midas
        run: pip install midas-ssg

      - name: Init Midas project
        run: |
          midas init /tmp/midas-site
          cp -r site/static/* /tmp/midas-site/static/ 2>/dev/null || true

      - name: Build site
        run: midas build
        working-directory: /tmp/midas-site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/midas-site/_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
