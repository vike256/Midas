{% extends "base.html" %}

{% block content %}
<article class="post-container">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <time class="post-date">{{ page.date }}</time>
    {% endif %}
    {% if page.description %}
    <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content | safe }}
  </div>
</article>
{% endblock %}
